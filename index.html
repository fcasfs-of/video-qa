<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Qualidade MP4</title>
    
    <!-- Favicon SVG Embutido Direto -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3czLm9yZycgdmlld0JveD0nMCAwIDI0IDI0Jz4gPHBhdGggZD0iTTE3IDEwLjVWN2MwLS41NS0uNDUtMS0xLTFINGMtLjU1IDAtMSAuNDUtMSAxdjEwYzAgLjU1LjQ1IDEgMSAxaDEyYy41NSAwIDEtLjQ1IDEtMXYtMy41bDQgNHYtMTFsLTQgNHpNMTIgMTRMOS43NSAxMWwtMS41IDJMNyAxMGwtMyA0aDE0bC0zLTQtMyA0eiIvPiAgPC9zdmc+">
    
<!-- Folhas de Estilo Modulares Isoladas Anti-Estouro -->
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="player.css">
<link rel="stylesheet" href="lightbox.css">
  
</head>
<body>

    <!-- Cabeçalho Principal (Header) -->
    <header class="app-header">
        <div class="header-logo">
            <svg viewBox="0 0 24 24" class="svg-icon-logo" aria-hidden="true">
                <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM12 14L9.75 11l-1.5 2L7 10l-3 4h14l-3-4-3 4z"/>
            </svg>
            <h1 data-i18n="app-title">Analisador de Qualidade MP4</h1>
        </div>
        
        <div class="header-controls">
            <button id="btn-toggle-lang" class="btn-icon" title="Mudar Idioma / Change Language">
                <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M12.87 15.07l-2.54-2.51l.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35C8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5l3.11 3.11l.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
            </button>
            <button id="btn-toggle-theme" class="btn-icon" title="Alternar Tema / Toggle Theme">
                <svg viewBox="0 0 24 24" class="svg-icon" id="icon-theme"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9s9-4.03 9-9c0-.46-.04-.92-.1-1.36c-.98 1.37-2.58 2.26-4.4 2.26c-2.98 0-5.4-2.42-5.4-5.4c0-1.81.89-3.42 2.26-4.4c-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
        </div>
    </header>

    <!-- Container Principal -->
    <main class="app-container">
        
        <!-- Área de Upload por Arraste ou Clique -->
        <section class="upload-section card">
            <div id="drop-zone" class="drop-zone-area">
                <svg viewBox="0 0 24 24" class="svg-icon-upload"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                <p data-i18n="drop-text">Arraste seu vídeo .mp4 aqui ou clique para selecionar</p>
                <input type="file" id="file-input" accept="video/mp4" hidden>
            </div>
        </section>

        <!-- Painel de Resultados Reativo -->
        <section id="results-container" class="results-grid d-none">
            
            <!-- Painel Esquerdo: Bloco de Imagem -->
            <div class="panel-left card">
                <h3 data-i18n="title-preview">Miniatura Extraída</h3>
                <div class="thumbnail-wrapper">
                    <img id="extracted-thumb" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Video Thumbnail Preview" class="img-preview-clickable">
                    <div class="thumb-overlay-actions">
                        <button id="btn-open-lightbox" class="btn-action-round" title="Expandir Imagem">
                            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM10 7H9v2H7v1h2v2h1v-2h2V9h-2V7z"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="action-buttons-group">
                    <button id="btn-download-thumb" class="btn-secondary">
                        <svg viewBox="0 0 24 24" class="svg-icon-btn"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                        <span data-i18n="btn-save-thumb">Salvar Miniatura</span>
                    </button>
                    <button id="btn-download-info" class="btn-secondary">
                        <svg viewBox="0 0 24 24" class="svg-icon-btn"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span data-i18n="btn-save-meta">Salvar Diagnóstico</span>
                    </button>
                </div>
            </div>

            <!-- Painel Direito: Diagnósticos Textuais -->
            <div class="panel-right card">
                <h3 data-i18n="title-metadata">Diagnóstico de Qualidade Técnica</h3>
                <div id="metadata-display" class="metadata-scroll-area">
                    <!-- Injetado dinamicamente via app.js -->
                </div>
            </div>

        </section>
    </main>


    <!-- Injeção dos Scripts Modulares Independentes -->
    <script src="download.js"></script>
    <script src="lightbox.js"></script>
    <script src="player.js"></script>
    <script src="app.js"></script>
  
</body>
</html>
